<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashStock Admin | Envios en Camino</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="../css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: "Space Grotesk", sans-serif;
            background: radial-gradient(circle at 10% 0%, #dbeafe 0%, #f8fafc 42%, #eef2ff 100%);
            color: #0f172a;
        }

        .shell {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.2rem 1rem 3rem;
        }

        .header {
            background: linear-gradient(120deg, #0f766e, #0ea5e9);
            color: #fff;
            border-radius: 16px;
            padding: 1.2rem;
            box-shadow: 0 12px 26px rgba(14, 116, 144, 0.2);
        }

        .panel {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            padding: 1rem;
        }

        .toggle-btn {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #0f766e;
            font-weight: 700;
        }

        .toggle-btn.open {
            transform: rotate(-90deg);
        }

        .details-row {
            display: none;
            background: #f8fafc;
        }

        .details-row.open {
            display: table-row;
        }

        .details-wrap {
            padding: 0.9rem;
        }

        .map-box {
            height: 360px;
            border: 1px solid #dbeafe;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
        }

        .meta-chip {
            display: inline-block;
            border: 1px solid #dbeafe;
            border-radius: 999px;
            padding: 4px 10px;
            margin-right: 6px;
            margin-bottom: 6px;
            background: #eff6ff;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="shell">
    <section class="header mb-3">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div>
                <h1 class="h4 mb-1">Panel de Envios en Camino</h1>
                <p class="mb-0">Monitoreo profesional de todos los delivery activos.</p>
            </div>
            <div class="d-flex gap-2">
                <a href="dashboard.html" class="btn btn-light btn-sm">Dashboard</a>
                <a href="inventory.html" class="btn btn-light btn-sm">Inventario</a>
                <a href="../order-status.html" class="btn btn-light btn-sm">Vista Cliente</a>
                <button id="btnRefreshShipments" type="button" class="btn btn-warning btn-sm">Refrescar</button>
            </div>
        </div>
        <div id="shipmentsHeaderInfo" class="small mt-2">Actualizado: -</div>
    </section>

    <section class="panel">
        <h2 class="h5 mb-2">Pedidos y Envíos en Vivo</h2>
        <div class="small text-muted mb-2" id="shipmentsLastUpdate">Actualizado: -</div>

        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead>
                <tr>
                    <th>Orden</th>
                    <th>Cliente</th>
                    <th>Tracking</th>
                    <th>Estado</th>
                    <th>ETA restante</th>
                    <th>Inicio envío</th>
                    <th>Última actualización</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="shipmentsTableBody">
                <tr><td colspan="8" class="text-muted">Cargando envíos...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</div>

<script src="/runtime-config.js"></script>
<script src="../js/admin-shipments.js"></script>
</body>
</html>
